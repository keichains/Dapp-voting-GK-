<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicVote</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #1353d8;
    --primary-bright: #1353d8;
    --bg: #f7f7fb;
    --surface: #ffffff;
    --text: #0d0d14;
    --muted: rgba(13,13,20,0.38);
    --accent: #1353d8;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Lexend', sans-serif;
    cursor: none;
  }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed; z-index: 9999;
    width: 10px; height: 10px;
    background: var(--primary-bright);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%,-50%);
    transition: transform 0.1s ease;
    mix-blend-mode: difference;
  }
  #cursor-ring {
    position: fixed; z-index: 9998;
    width: 36px; height: 36px;
    border: 1px solid rgba(19,83,216,0.35);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%,-50%);
    transition: transform 0.18s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
  }

  /* ── Canvas background ── */
  #bg-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ── Grain overlay ── */
  .grain {
    position: fixed; inset: -50%;
    width: 200%; height: 200%;
    z-index: 1;
    opacity: 0.015;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    animation: grain-shift 0.8s steps(2) infinite;
  }
  @keyframes grain-shift {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(-3%,4%); }
    50%  { transform: translate(5%,-2%); }
    75%  { transform: translate(-4%,-5%); }
    100% { transform: translate(3%,2%); }
  }

  /* ── Main layout ── */
  #wrapper {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 40px 56px;
  }

  /* ── Top bar ── */
  .top-bar {
    display: flex; justify-content: space-between; align-items: flex-start;
    opacity: 0;
    animation: fade-up 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
  }
  .logo {
    font-size: 16px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent);
  }
  .top-meta {
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 14px; color: var(--muted);
    line-height: 1.8;
  }
  .top-meta span { display: block; }

  /* ── Hero center ── */
  .hero {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 14px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 24px;
    opacity: 0;
    animation: fade-up 0.8s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
  }

  .headline-wrap { overflow: hidden; }
  .headline {
    font-size: clamp(64px, 11vw, 136px);
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.04em;
    color: var(--text);
    display: block;
    transform: translateY(110%);
    animation: slide-up 1s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .headline:nth-child(2) { animation-delay: 0.08s; }
  .headline .hl {
    -webkit-text-stroke: 2px var(--primary-bright);
    color: transparent;
  }

  .sub {
    margin-top: 32px;
    font-size: 18px; font-weight: 300;
    color: var(--muted); max-width: 360px;
    line-height: 1.65;
    opacity: 0;
    animation: fade-up 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    margin-top: 48px;
    opacity: 0;
    animation: fade-up 0.8s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
  }
  .progress-track {
    width: min(340px, 90vw); height: 1px;
    background: rgba(13,13,20,0.1);
    position: relative; overflow: hidden;
  }
  .progress-fill {
    position: absolute; left: 0; top: 0;
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--primary-bright), var(--accent));
    transition: width 0.06s linear;
    box-shadow: 0 0 12px var(--primary-bright);
  }
  .progress-label {
    margin-top: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 15px; color: var(--muted);
    display: flex; justify-content: space-between;
    width: min(340px, 90vw);
  }
  #pct { color: var(--accent); }

  /* ── Bottom bar ── */
  .bottom-bar {
    display: flex; justify-content: space-between; align-items: flex-end;
    opacity: 0;
    animation: fade-up 0.8s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
  }
  .bottom-left {
    font-family: 'Space Mono', monospace;
    font-size: 12px; color: var(--muted);
    line-height: 1.9; letter-spacing: 0.05em;
  }
  .bottom-left b { color: rgba(13,13,20,0.65); }
  .manual-link {
    font-family: 'Space Mono', monospace;
    font-size: 13px; color: var(--accent);
    text-decoration: none;
    display: flex; align-items: center; gap: 8px;
    transition: opacity 0.25s;
  }
  .manual-link:hover { opacity: 0.6; }
  .manual-link::after {
    content: '';
    display: inline-block; width: 28px; height: 1px;
    background: var(--accent);
    transition: width 0.3s ease;
  }
  .manual-link:hover::after { width: 48px; }

  /* ── Diagonal deco number ── */
  .deco-number {
    position: absolute; right: 0; bottom: -20px;
    font-size: clamp(144px,18vw,264px);
    font-weight: 900; letter-spacing: -0.06em;
    line-height: 1;
    -webkit-text-stroke: 1px rgba(19,83,216,0.07);
    color: transparent;
    pointer-events: none;
    user-select: none;
    animation: counter-down 3s steps(1,end) forwards;
  }

  /* ── Keyframes ── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slide-up {
    to { transform: translateY(0); }
  }

  /* ── Page exit ── */
  #page {
    position: fixed; inset: 0; z-index: 100;
    background: var(--primary);
    transform: scaleY(0);
    transform-origin: bottom;
    will-change: transform;
  }
  #page.reveal {
    animation: curtain 0.9s cubic-bezier(0.76,0,0.24,1) forwards;
  }
  @keyframes curtain {
    0%   { transform: scaleY(0); transform-origin: bottom; }
    50%  { transform: scaleY(1); transform-origin: bottom; }
    51%  { transform-origin: top; }
    100% { transform: scaleY(0); transform-origin: top; }
  }

  @media (max-width: 600px) {
    #wrapper { padding: 24px 28px; }
  }
</style>
</head>
<body>

<!-- Cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Grain -->
<div class="grain"></div>

<!-- Canvas BG -->
<canvas id="bg-canvas"></canvas>

<!-- Page transition overlay -->
<div id="page"></div>

<!-- Main -->
<div id="wrapper">

  <div class="top-bar">
    <div class="logo">CivicVote</div>
    <div class="top-meta">
      <span id="clock">00:00:00</span>
      <span>Đang khởi động hệ thống</span>
    </div>
  </div>

  <div class="hero">
    <div class="eyebrow">&#x2014;&nbsp; Chuyển hướng tự động &nbsp;&#x2014;</div>

    <div class="headline-wrap">
      <span class="headline">CIVIC</span>
    </div>
    <div class="headline-wrap">
      <span class="headline"><span class="hl">VOTE</span></span>
    </div>

    <p class="sub">Nền tảng bỏ phiếu phi tập trung — minh bạch, bảo mật và công bằng cho mọi công dân.</p>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="bar"></div>
      </div>
      <div class="progress-label">
        <span>Đang tải&hellip;</span>
        <span><span id="pct">0</span>%</span>
      </div>
    </div>

    <div class="deco-number" id="deco">3</div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-left">
      <b>Chuyển hướng đến</b> login.html<br>
      Hệ thống sẽ tự động điều hướng
    </div>
    <a href="login.html" class="manual-link">Bấm vào đây</a>
  </div>

</div>

<script>
/* ── Clock ── */
function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    [d.getHours(),d.getMinutes(),d.getSeconds()]
      .map(n=>String(n).padStart(2,'0')).join(':');
}
setInterval(updateClock, 1000);
updateClock();

/* ── Cursor ── */
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  cur.style.left=mx+'px'; cur.style.top=my+'px';
});
(function animRing(){
  rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
})();

/* ── Canvas: floating orbs ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, orbs = [];

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

function makeOrb(){
  return {
    x: Math.random()*W, y: Math.random()*H,
    r: 160+Math.random()*260,
    vx: (Math.random()-0.5)*0.18,
    vy: (Math.random()-0.5)*0.18,
    hue: [220,235,210,200][Math.floor(Math.random()*4)],
    alpha: 0.06+Math.random()*0.07,
  };
}
for(let i=0;i<5;i++) orbs.push(makeOrb());

function drawOrbs(){
  ctx.clearRect(0,0,W,H);
  for(const o of orbs){
    const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
    g.addColorStop(0,`hsla(${o.hue},70%,70%,${o.alpha})`);
    g.addColorStop(1,'transparent');
    ctx.beginPath();
    ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
    ctx.fillStyle=g;
    ctx.fill();
    o.x+=o.vx; o.y+=o.vy;
    if(o.x<-o.r||o.x>W+o.r||o.y<-o.r||o.y>H+o.r){
      Object.assign(o,makeOrb());
      o.x=Math.random()*W; o.y=Math.random()*H;
    }
  }
  requestAnimationFrame(drawOrbs);
}
drawOrbs();

/* ── Progress + redirect ── */
const bar   = document.getElementById('bar');
const pct   = document.getElementById('pct');
const deco  = document.getElementById('deco');
const page  = document.getElementById('page');

const DURATION = 3200; // ms
let start = null;

function easeInOut(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

function tick(ts){
  if(!start) start=ts;
  const elapsed = ts-start;
  const raw = Math.min(elapsed/DURATION,1);
  const p = Math.round(easeInOut(raw)*100);
  bar.style.width = p+'%';
  pct.textContent = p;

  const countdown = 3-Math.floor(raw*3);
  deco.textContent = countdown>0 ? countdown : '';

  if(raw<1){ requestAnimationFrame(tick); }
  else {
    /* curtain transition then redirect */
    page.classList.add('reveal');
    setTimeout(()=>{ window.location.href='login.html'; }, 680);
  }
}

/* Start after animations settle */
setTimeout(()=>requestAnimationFrame(tick), 1200);
</script>
</body>
</html>
